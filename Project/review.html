<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-cover bg-no-repeat opacity-75 bg-[url('/image/reviwe.jpg')] flex justify-center items-center">
    <nav class="w-full bg-black bg-opacity-80 fixed top-0 left-0 z-10">
        <div class="container mx-auto flex justify-between items-center py-4 px-8">
            <div class="text-white text-2xl font-serif font-bold">ExploreGo</div>
            <ul class="flex space-x-6 text-white">
                <li><a href="home.html" class="hover:text-gray-400">Home</a></li>
                <li><a href="review.html" class="hover:text-gray-400">Review</a></li>
                <li><a href="reccomandation.html">Recommendations</a></li>
                <li><a href="viewreview.html" class="hover:text-gray-400">View Reviews</a></li>
            </ul>
        </div>
    </nav>
    <div class="w-1/1 p-8 h-70 rounded-md m-auto mt-10 shadow-lg shadow-gray-900 mt-32 bg-black">
        <h2 class="text-center text-white text-3xl font-semibold mb-6 font-serif">Submit a Review</h2>
        <form id="reviewForm">
            <!-- Place Name Field -->
            <div class="mb-4">
                <label for="placename" class="block text-white text-lg mb-2 font-serif ml-10">Place Name</label>
                <input type="text" id="placename" class="w-11/12 h-16 px-3 py-2 border border-white/30 bg-transparent text-white rounded focus:outline-none focus:ring-2 focus:ring-white/70 placeholder-white/70 ml-10" placeholder="Enter place name" required>
            </div>

            <!-- Image Upload Field -->
            <div class="mb-4">
                <label for="image" class="block text-white text-lg mb-2 font-serif ml-10">Choose Image</label>
                <input type="file" id="image" class="w-11/12 h-16 px-3 py-2 border border-white/30 bg-transparent text-white rounded focus:outline-none focus:ring-2 focus:ring-white/70 ml-10" accept="image/*">
            </div>

            <!-- Name Field -->
            <div class="mb-4">
                <label for="name" class="block text-white text-lg mb-2 font-serif ml-10">Name</label>
                <input type="text" id="name" class="w-11/12 h-16 px-3 py-2 border border-white/30 bg-transparent text-white rounded focus:outline-none focus:ring-2 focus:ring-white/70 placeholder-white/70 ml-10" placeholder="Enter your name" required>
            </div>

            <!-- Review Field -->
            <div class="mb-4">
                <label for="review" class="block text-white text-lg mb-2 font-serif ml-10">Review</label>
                <textarea cols="55" rows="4" placeholder="Enter your review" class=" px-3 py-2 border border-white/30 bg-transparent text-white rounded focus:outline-none focus:ring-2 focus:ring-white/70 placeholder-white/70 ml-10" required></textarea>
            </div>

            <!-- Rating Field -->
            <div class="mb-4">
                <label for="rating" class="block text-white text-lg mb-2 font-serif ml-10">Rating</label>
                <input type="number" id="rating" class="w-11/12 h-16 px-3 py-2 border border-white/30 bg-transparent text-white rounded focus:outline-none focus:ring-2 focus:ring-white/70 placeholder-white/70 ml-10" placeholder="Rate 1-5" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-11/12 h-16 bg-blue-700 hover:bg-blue-800 text-white py-2 rounded-md transition duration-200 font-serif ml-10">Submit Review</button>
            <!-- <div class="mt-4 text-center">
                <a href="viewreview.html" class="text-lg text-white hover:underline mt-32 font-serif ml-10">View Review</a>
            </div> -->
            <script src="rev.js"></script>
        </form>
    </div>
</body>
</html>
