<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-cover bg-no-repeat opacity-75 bg-[url('/image/bali.jpg')] flex justify-center items-center min-h-screen">

    <!-- Navbar -->
    <nav class="w-full bg-black bg-opacity-80 fixed top-0 left-0 z-10">
        <div class="container mx-auto flex justify-between items-center py-4 px-8">
            <div class="text-white text-2xl font-serif font-bold">ExploreGo</div>
            <ul class="flex space-x-6 text-white">
                <li><a href="home.html" class="hover:text-gray-400">Home</a></li>
                <li><a href="Login.html" class="hover:text-gray-400">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Sign Up Form Container -->
    <div class="w-full sm:w-2/3 md:w-1/2 lg:w-1/3 p-8 h-auto rounded-md shadow-lg shadow-gray-900 mt-10 sm:mt-20 md:mt-32 bg-black bg-opacity-80">
        <h2 class="text-center text-white text-3xl font-semibold mb-6 font-serif">Sign Up</h2>
        <form>
            <div class="mb-4">
                <label for="username" class="block text-white text-lg mb-2 font-serif">Full Name</label>
                <input type="text" id="username" class="w-full h-16 px-3 py-2 border border-white/30 bg-transparent text-white rounded focus:outline-none focus:ring-2 focus:ring-white/70 placeholder-white/70" placeholder="Enter your fullname">
            </div>
            <div class="mb-4">
                <label for="email" class="block text-white text-lg mb-2 font-serif">Email</label>
                <input type="email" id="email" class="w-full h-16 px-3 py-2 border border-white/30 bg-transparent text-white rounded focus:outline-none focus:ring-2 focus:ring-white/70 placeholder-white/70" placeholder="Enter your email">
            </div>
            <div class="mb-4">
                <label for="password" class="block text-white text-lg mb-2 font-serif">Password</label>
                <input type="password" id="password" class="w-full h-16 px-3 py-2 border border-white/30 bg-transparent text-white rounded focus:outline-none focus:ring-2 focus:ring-white/70 placeholder-white/70" placeholder="Enter your password">
            </div>
            <div class="mb-4">
                <label for="confirm-password" class="block text-white text-lg mb-2 font-serif">Confirm Password</label>
                <input type="password" id="confirm-password" class="w-full h-16 px-3 py-2 border border-white/30 bg-transparent text-white rounded focus:outline-none focus:ring-2 focus:ring-white/70 placeholder-white/70" placeholder="Confirm your password">
            </div>
            <div class="flex justify-between items-center mb-6">
                <label class="flex items-center text-white">
                    <input type="checkbox" class="mr-2">
                    <span class="text-lg font-serif">I agree to the terms of use</span>
                </label>
                <a href="#" class="text-lg text-white hover:underline font-serif">Forgot password?</a>
            </div>
            <button type="submit" class="w-full h-16 bg-blue-700 hover:bg-blue-800 text-white py-2 rounded-md transition duration-200 font-serif">Sign Up</button>
            <div class="mt-4 text-center">
                <a href="Login.html" class="text-lg text-white hover:underline font-serif">Already have an account? Login now</a>
            </div>
        </form>
    </div>

</body>
</html>
