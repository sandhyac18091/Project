<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-serif">
    <!-- Navigation Bar -->
    <nav class="bg-white shadow-md fixed top-0 left-0 w-full z-10">
        <div class="container mx-auto flex items-center justify-between py-4 px-6">
            <a href="home.html" class="text-2xl font-bold text-gray-800">ExploreGo</a>
            <ul class="hidden md:flex space-x-6">
                <li><a href="home.html" class="text-gray-600 hover:text-blue-500">Home</a></li>
                
                <li><a href="review.html" class="text-gray-600 hover:text-blue-500">Review</a></li>
                <li><a href="recommendation.html" class="text-gray-600 hover:text-blue-500">Recommendations</a></li>
                <li><a href="viewreview.html" class="text-gray-600 hover:text-blue-500">View Reviews</a></li>
                <li><a href="feedback.html" class="text-gray-600 hover:text-blue-500">Feedback</a></li>
            </ul>
        </div>
    </nav>

    <!-- Feedback Form Section -->
    <main class="container mx-auto mt-16 px-4">
        <h2 class="text-3xl font-bold text-green-500 mt-10">We Value Your Feedback</h2>
        <p class="text-lg text-gray-600 mt-2">Please fill out the form below to share your thoughts and suggestions.</p>
        <form action="/submit_feedback" method="POST" class="bg-white shadow-lg p-6 rounded-lg mt-6">
            <div class="mb-4">
                <label for="name" class="block text-gray-700">Name</label>
                <input type="text" id="name" name="name" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label for="email" class="block text-gray-700">Email</label>
                <input type="email" id="email" name="email" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label for="feedback" class="block text-gray-700">Feedback</label>
                <textarea id="feedback" name="feedback" rows="4" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring focus:ring-blue-500"></textarea>
            </div>
            <button type="submit" class="bg-green-500 text-white font-bold py-2 px-4 rounded hover:bg-green-600">Submit Feedback</button>
        </form>
    </main>

    <!-- Footer -->
    <footer class="bg-white mt-12 py-4">
        <div class="container mx-auto text-center text-gray-600">
            <p>&copy; 2024 ExploreGo. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
