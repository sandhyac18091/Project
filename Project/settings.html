<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <!-- Navbar -->
    <nav class="bg-gray-800 p-4">
        <div class="container mx-auto flex justify-between">
            <a href="#" class="text-white text-2xl font-semibold">Admin Dashboard</a>
            <div class="flex space-x-4">
                <a href="settings.html" class="text-gray-300 hover:text-white">Settings</a>
                <a href="logout.html" class="text-gray-300 hover:text-white">Logout</a>
            </div>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar -->
        <div class="bg-gray-900 w-64 min-h-screen p-6">
            <ul class="space-y-4">
                <li>
                    <a href="#" class="text-gray-300 hover:text-white block">Dashboard</a>
                </li>
                <li>
                    <a href="view-image.html" class="text-gray-300 hover:text-white block">Manage Places</a>
                </li>
                <li>
                    <a href="visitors.html" class="text-gray-300 hover:text-white block">Visitors insights</a>
                </li>
                <li>
                    <a href="site.html" class="text-gray-300 hover:text-white block">Site Analytics</a>
                </li>
                <li>
                    <a href="help.html" class="text-gray-300 hover:text-white block">Help</a>
                </li>
                <li>
                    <a href="settings.html" class="text-gray-300 hover:text-white block">Settings</a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8">
            <h1 class="text-3xl font-semibold text-gray-700">Settings</h1>

            <!-- Profile Settings -->
            <div class="mt-8 bg-white shadow-lg rounded-lg p-6">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4">Profile Settings</h2>
                <form id="profileForm">
                    <label class="block text-gray-700">Username</label>
                    <input type="text" class="mt-2 block w-full p-2 border border-gray-300 rounded" value="Admin123">

                    <label class="block text-gray-700 mt-4">Email</label>
                    <input type="email" class="mt-2 block w-full p-2 border border-gray-300 rounded" value="admin@example.com">

                    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded mt-4">Update Profile</button>
                </form>
            </div>

            <!-- Password Settings -->
            <div class="mt-8 bg-white shadow-lg rounded-lg p-6">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4">Change Password</h2>
                <form id="passwordForm">
                    <label class="block text-gray-700">Current Password</label>
                    <input type="password" class="mt-2 block w-full p-2 border border-gray-300 rounded">

                    <label class="block text-gray-700 mt-4">New Password</label>
                    <input type="password" class="mt-2 block w-full p-2 border border-gray-300 rounded">

                    <label class="block text-gray-700 mt-4">Confirm New Password</label>
                    <input type="password" class="mt-2 block w-full p-2 border border-gray-300 rounded">

                    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded mt-4">Change Password</button>
                </form>
            </div>

            <!-- Notification Settings -->
            <div class="mt-8 bg-white shadow-lg rounded-lg p-6">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4">Notification Settings</h2>
                <label class="flex items-center">
                    <input type="checkbox" class="form-checkbox" checked>
                    <span class="ml-2 text-gray-700">Email Notifications</span>
                </label>
                <label class="flex items-center mt-4">
                    <input type="checkbox" class="form-checkbox">
                    <span class="ml-2 text-gray-700">SMS Notifications</span>
                </label>
                <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded mt-4">Save Changes</button>
            </div>
        </div>
    </div>

</body>
</html>
