<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 shadow-lg rounded-lg p-10 w-96 text-center">
        <h1 class="text-3xl font-semibold text-white mb-4">Logout</h1>
        <p class="text-gray-300 mb-6">Are you sure you want to log out?</p>
        
        <div class="flex justify-center space-x-4">
            <a href="login.html" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded transition duration-200">Yes, Logout</a>
            <a href="dashboard.html" class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded transition duration-200">Cancel</a>
        </div>

        <div class="mt-6">
            <p class="text-gray-400 text-sm">If you change your mind, you can return to the dashboard.</p>
        </div>
    </div>

</body>
</html>
